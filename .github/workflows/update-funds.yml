name: Update Fund Data

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 6pm IST Mon-Fri (12:30 UTC)
  workflow_dispatch:          # allow manual trigger
    inputs:
      max_funds:
        description: 'Max number of funds to process'
        required: false
        default: '500'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fund update pipeline
        run: npm run update-funds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAX_FUNDS: ${{ github.event.inputs.max_funds || '500' }}

      - name: Notify on failure
        if: failure()
        run: echo "Fund update pipeline failed! Check logs above."
