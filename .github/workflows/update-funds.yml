name: Update Fund Data

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 6pm IST Mon-Fri (12:30 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch real fund data from MFAPI
        run: |
          python3 scripts/fetch_funds.py > public/data/funds.json
          echo "Funds updated: $(python3 -c "import json; print(len(json.load(open('public/data/funds.json'))))")"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json
          git diff --staged --quiet || git commit -m "chore: update fund data $(date -u '+%Y-%m-%d')"
          git push
