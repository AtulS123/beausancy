name: Update Fund Data

# -------------------------------------------------------------------
# Three jobs:
#
#   update-nav (daily, Mon-Fri):
#     Fetches live NAV history from mfapi.in, re-computes returns,
#     drawdowns, and rolling consistency.  Reads AUM / expense ratio /
#     managers / concentration from scripts/data/static_fund_data.json.
#     Output → public/data/funds.json
#     Then upserts all funds into the Neon PostgreSQL database.
#
#   update-static (monthly, 1st of each month):
#     Uses Playwright (headless Chromium) to scrape AMFI's scheme
#     performance pages for AUM and expense ratio. Updates
#     scripts/data/static_fund_data.json and commits the result.
#     This is the only reliable free source for Indian MF AUM + TER.
#
#   validate-static (weekly, Mondays):
#     Prints a reminder to check whether static_fund_data.json is still
#     current. AMC factsheets drop around the 5th–10th of each month.
#     Manager names, style and concentration still need manual updates.
#
# Manual trigger: Actions → "Update Fund Data" → Run workflow.
# Required secret: DATABASE_URL (Neon connection string)
# -------------------------------------------------------------------

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 6 pm IST Mon–Fri (12:30 UTC) — daily NAV update
    - cron: '0 3 1 * *'        # 8:30 am IST 1st of each month — AUM + ER scrape
    - cron: '0 4 * * 1'        # 9:30 am IST every Monday — static-data reminder
  workflow_dispatch:           # also triggerable manually from the Actions tab

jobs:
  # ── Daily NAV update ──────────────────────────────────────────────
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live fund data from MFAPI
        run: |
          python3 scripts/fetch_funds.py > public/data/funds.json 2>fetch_stderr.txt
          cat fetch_stderr.txt >&2
          FUND_COUNT=$(python3 -c "import json; print(len(json.load(open('public/data/funds.json'))))")
          echo "funds_updated=$FUND_COUNT" >> $GITHUB_OUTPUT
          echo "Funds updated: $FUND_COUNT"
          # Surface any validation warnings as a workflow notice
          if grep -q "VALIDATION WARNING" fetch_stderr.txt; then
            echo "::warning::Static data warnings found — check fetch_stderr output and update scripts/data/static_fund_data.json"
          fi
        id: fetch

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Sync funds to Neon database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/sync_db.py

      - name: Commit updated funds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json
          git diff --staged --quiet || git commit -m "chore: update fund data $(date -u '+%Y-%m-%d') [${{ steps.fetch.outputs.funds_updated }} funds]"
          git push

  # ── Monthly AUM + ER scrape (1st of each month) ──────────────────
  update-static:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 1 * *' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright and Chromium
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape AMFI for AUM and expense ratio
        run: python3 scripts/fetch_amfi_static.py

      - name: Commit updated static_fund_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/data/static_fund_data.json
          git diff --staged --quiet || git commit -m "chore: update AUM + expense ratio from AMFI $(date -u '+%Y-%m')"
          git push

  # ── Weekly static-data reminder (Mondays only) ───────────────────
  validate-static:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * 1' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check static data freshness
        run: |
          python3 - <<'EOF'
          import json, datetime, sys

          with open("scripts/data/static_fund_data.json") as f:
              data = json.load(f)

          last_updated = data.get("_meta", {}).get("last_updated", "unknown")
          print(f"static_fund_data.json last_updated: {last_updated}")

          try:
              dt = datetime.date.fromisoformat(last_updated)
              age_days = (datetime.date.today() - dt).days
              if age_days > 35:
                  print(f"::warning::static_fund_data.json is {age_days} days old. AMC factsheets drop around the 5th-10th of each month — time to update AUM, expense ratios, managers, and concentration. See MAINTENANCE.md.")
              else:
                  print(f"Static data is {age_days} days old — looks current.")
          except ValueError:
              print("::warning::Could not parse last_updated date in static_fund_data.json")
          EOF
