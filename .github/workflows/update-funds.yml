name: Update Fund Data

# Runs every weekday at 6 pm IST (12:30 UTC).
# Also triggerable manually from Actions → "Update Fund Data" → Run workflow.
#
# What it does:
#   1. Fetches live NAV history from mfapi.in and rebuilds public/data/funds.json
#   2. Commits and pushes the updated file so Vercel serves fresh data
#   3. (Optional) If DATABASE_URL secret is set, also syncs to the Neon DB
#   4. On the 1st of each month, runs the Groww scraper to refresh AUM/ER/managers
#   5. Every Monday, checks whether static_fund_data.json is more than 35 days old

on:
  schedule:
    - cron: '0 18 * * 1-5'    # 11:30 pm IST Mon–Fri — daily NAV refresh
    - cron: '0 3 1 * *'        # 8:30 am IST 1st/month — Groww AUM/ER scrape
    - cron: '0 4 * * 1'        # 9:30 am IST every Mon — static-data freshness check
  workflow_dispatch:

jobs:
  # ── Daily: fetch live NAV data and rebuild funds.json ────────────────────
  update-nav:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 * * 1-5'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live NAV data
        run: |
          python3 scripts/fetch_funds.py > public/data/funds.json 2>fetch_stderr.txt
          cat fetch_stderr.txt >&2
          COUNT=$(python3 -c "import json; print(len(json.load(open('public/data/funds.json'))))")
          echo "Fetched $COUNT funds"
          if grep -q "VALIDATION WARNING" fetch_stderr.txt; then
            echo "::warning::Missing static data — check fetch_stderr output and update scripts/data/static_fund_data.json"
          fi

      - name: Commit updated funds.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/funds.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: daily NAV refresh $(date -u '+%Y-%m-%d')" &&
            git push
          )

      - name: Sync to Neon DB (optional)
        if: env.DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install psycopg2-binary -q
          python3 scripts/sync_db.py

  # ── Monthly: refresh AUM, ER, and managers from Groww ────────────────────
  update-static:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 1 * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape Groww for AUM, ER, and manager data
        run: python3 scripts/fetch_groww_static.py 2>&1

      - name: Rebuild funds.json with updated static data
        run: python3 scripts/fetch_funds.py > public/data/funds.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/data/static_fund_data.json public/data/funds.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: monthly AUM/ER/manager refresh $(date -u '+%Y-%m')" &&
            git push
          )

  # ── Weekly: warn if static data hasn't been updated recently ─────────────
  validate-static:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * 1'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check static data freshness
        run: |
          python3 - <<'EOF'
          import json, datetime, sys
          with open("scripts/data/static_fund_data.json") as f:
              data = json.load(f)
          last_updated = data.get("_meta", {}).get("last_updated", "unknown")
          print(f"static_fund_data.json last updated: {last_updated}")
          try:
              age = (datetime.date.today() - datetime.date.fromisoformat(last_updated)).days
              if age > 35:
                  print(f"::warning::static_fund_data.json is {age} days old. Update AUM, expense ratios, managers, and concentration from AMC factsheets. See MAINTENANCE.md.")
              else:
                  print(f"Static data is {age} days old — current.")
          except ValueError:
              print("::warning::Cannot parse last_updated date in static_fund_data.json")
          EOF
